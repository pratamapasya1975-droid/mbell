<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Good Morning - Good Night Belva</title>

<link rel="stylesheet" href="./file/default.css">

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    font-family:sans-serif;
    overflow:hidden;
}

/* CENTER LAYOUT */
#main{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#wrap{
    position:relative;
    width:100%;
    height:100%;
}

/* TEXT */
#text{
    position:absolute;
    z-index:2;
    width:100%;
    top:8%;
    text-align:center;
    padding:0 20px;
}

#code{
    display:none;
    color:#ff4d6d;
    font-size:clamp(14px,2.5vw,22px);
    line-height:1.6;
}

.say{
    display:block;
    margin:4px 0;
}

/* CANVAS */
#canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

#error{
    display:none;
    color:white;
    text-align:center;
}

</style>
</head>

<body>

<div id="main">

<div id="error">
Browser tidak mendukung HTML5 Canvas.
</div>

<div id="wrap">

<div id="text">
<div id="code">
<span class="say">称呼</span>
<span class="say">i Love You</span>
<span class="say">i Love You More</span>
<span class="say">i Love You So Much</span>
<span class="say">i Love You from the start</span>
<span class="say">i Love You to the moon</span>
<span class="say">i Love You so bad</span>
<span class="say">i Love You more than everything</span>
<span class="say">i Love You Always</span>
<span class="say">i Love You So Bad</span>
<span class="say">i Love You So</span>
<span class="say">i Love You 3000</span>
<span class="say">— I Love You Belva</span>
</div>
</div>

<canvas id="canvas"></canvas>

</div>
</div>

<script>

(function(){

var canvas = document.getElementById("canvas");

if (!canvas.getContext){
    document.getElementById("error").style.display="block";
    return;
}

/* ===== RESPONSIVE CANVAS ===== */
function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

var width = canvas.width;
var height = canvas.height;

/* ===== TREE OPTIONS ===== */
var opts = {
    seed:{
        x: width/2,
        color:"rgb(190,26,37)",
        scale:2
    },
    branch:[
        [535,680,570,250,500,200,30,100]
    ],
    bloom:{
        num:700,
        width:width,
        height:height
    },
    footer:{
        width:width,
        height:5,
        speed:10
    }
};

var tree = new Tree(canvas,width,height,opts);
var seed = tree.seed;
var foot = tree.footer;

/* AUTO START (NO CLICK) */
var hold = 0;

/* ===== ANIMATIONS ===== */

var seedAnimate = eval(Jscex.compile("async", function () {

    seed.draw();

    while (seed.canScale()) {
        seed.scale(0.95);
        $await(Jscex.Async.sleep(10));
    }

    while (seed.canMove()) {
        seed.move(0,2);
        foot.draw();
        $await(Jscex.Async.sleep(10));
    }

}));

var growAnimate = eval(Jscex.compile("async", function () {
    do{
        tree.grow();
        $await(Jscex.Async.sleep(10));
    }while(tree.canGrow());
}));

var flowAnimate = eval(Jscex.compile("async", function () {
    do{
        tree.flower(2);
        $await(Jscex.Async.sleep(10));
    }while(tree.canFlower());
}));

var jumpAnimate = eval(Jscex.compile("async", function () {
    while(true){
        tree.ctx.clearRect(0,0,width,height);
        tree.jump();
        foot.draw();
        $await(Jscex.Async.sleep(25));
    }
}));

var textAnimate = eval(Jscex.compile("async", function () {
    $("#code").show().typewriter();
}));

var runAsync = eval(Jscex.compile("async", function () {

    $await(seedAnimate());
    $await(growAnimate());
    $await(flowAnimate());

    textAnimate().start();

    $await(jumpAnimate());
}));

runAsync().start();

})();

</script>

</body>
</html>
