<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Belva</title>

<link rel="stylesheet" href="./file/default.css">

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    background:#ffe;
    overflow:hidden;
}

/* CENTER SCENE */
#wrap{
    position:fixed;
    top:50%;
    left:50%;
    transform-origin:center center;
}

</style>
</head>

<body>

<div id="wrap">

    <div id="text">
        <div id="code">
            <font color="#FF0000">
                <span class="say">I just want to say...</span><br>
                <span class="say">I Love You</span><br>
                <span class="say">I Love You More</span><br>
                <span class="say">I Love You So Much</span><br>
                <span class="say">I Love You From The Start</span><br>
                <span class="say">I Love You To The Moon</span><br>
                <span class="say">I Love You Always</span><br>
                <span class="say">I Love You Belva ❤️</span>
            </font>
        </div>
    </div>

    <!-- CANVAS HARUS DI DALAM WRAP -->
    <canvas id="canvas" width="1100" height="680"></canvas>

</div>

<script>

(function(){

    var canvas = $('#canvas');

    if (!canvas[0].getContext) return;

    /* ========= IMPORTANT =========
       JANGAN resize canvas
       ukuran asli animasi
    ================================= */
    var width = 1100;
    var height = 680;

    /* ========= TREE CONFIG ========= */
    var opts = {
        seed:{
            x:width/2-20,
            color:"rgb(190,26,37)",
            scale:2
        },
        branch:[
            [535,680,570,250,500,200,30,100,[
                [540,500,455,417,340,400,13,100,[
                    [450,435,434,430,394,395,2,40]
                ]],
                [550,445,600,356,680,345,12,100,[
                    [578,400,648,409,661,426,3,80]
                ]]
            ]]
        ],
        bloom:{num:700,width:1080,height:650},
        footer:{width:1200,height:5,speed:10}
    };

    var tree = new Tree(canvas[0],width,height,opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    /* ========= CLICK + TOUCH FIX ========= */
    canvas.on("click touchstart",function(e){

        var evt = e.originalEvent.touches
            ? e.originalEvent.touches[0]
            : e;

        var offset = canvas.offset();
        var x = evt.pageX-offset.left;
        var y = evt.pageY-offset.top;

        if(seed.hover(x,y)){
            hold=0;
            canvas.off("click touchstart");
        }
    });

    /* ========= ANIMATIONS ========= */

    var seedAnimate = eval(Jscex.compile("async",function(){
        seed.draw();
        while(hold){
            $await(Jscex.Async.sleep(10));
        }
        while(seed.canScale()){
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while(seed.canMove()){
            seed.move(0,2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async",function(){
        do{
            tree.grow();
            $await(Jscex.Async.sleep(10));
        }while(tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async",function(){
        do{
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        }while(tree.canFlower());
    }));

    var jumpAnimate = eval(Jscex.compile("async",function(){
        while(true){
            tree.ctx.clearRect(0,0,width,height);
            tree.jump();
            foot.draw();
            $await(Jscex.Async.sleep(25));
        }
    }));

    var textAnimate = eval(Jscex.compile("async",function(){
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async",function(){
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        textAnimate().start();
        $await(jumpAnimate());
    }));


    /* ========= RESPONSIVE SCALE ========= */

    function fitScreen(){

        const designW = 1100;
        const designH = 680;

        const scale = Math.min(
            window.innerWidth/designW,
            window.innerHeight/designH
        );

        document.getElementById("wrap").style.transform =
            "translate(-50%,-50%) scale("+scale+")";
    }

    fitScreen();
    window.addEventListener("resize",fitScreen);

    runAsync().start();

})();

</script>
</body>
</html>
